openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ElevateKe Investment Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: dashboard
  - name: plans
  - name: deposits
  - name: earnings
  - name: tasks
  - name: withdrawals
  - name: trade
  - name: announcements
  - name: inbox
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/admin-login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/referrals:
    get:
      operationId: getReferrals
      tags: [users]
      summary: Get user referrals
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /users/login-history:
    get:
      operationId: getLoginHistory
      tags: [users]
      summary: Get login history
      responses:
        "200":
          description: Login history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoginHistoryEntry"

  /users/claim-login-bonus:
    post:
      operationId: claimLoginBonus
      tags: [users]
      summary: Claim daily login bonus
      responses:
        "200":
          description: Bonus claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusResult"
        "400":
          description: Already claimed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /plans:
    get:
      operationId: getPlans
      tags: [plans]
      summary: Get all deposit plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepositPlan"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a deposit plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositPlan"

  /deposits:
    get:
      operationId: getDeposits
      tags: [deposits]
      summary: Get user deposits
      responses:
        "200":
          description: List of deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Create a deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositBody"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositWithPaystack"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deposits/verify:
    post:
      operationId: verifyDeposit
      tags: [deposits]
      summary: Verify Paystack payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDepositBody"
      responses:
        "200":
          description: Deposit verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"
        "400":
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /earnings:
    get:
      operationId: getEarnings
      tags: [earnings]
      summary: Get earnings history
      responses:
        "200":
          description: Earnings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Earning"

  /earnings/claim:
    post:
      operationId: claimDailyEarnings
      tags: [earnings]
      summary: Claim daily earnings
      responses:
        "200":
          description: Earnings claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusResult"
        "400":
          description: Already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /earnings/reinvest:
    post:
      operationId: reinvestEarnings
      tags: [earnings]
      summary: Reinvest earnings into balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReinvestBody"
      responses:
        "200":
          description: Reinvested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get available tasks
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusResult"
        "400":
          description: Already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /withdrawals:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: Get withdrawal history
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWithdrawalBody"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trade/settings:
    get:
      operationId: getTradeSettings
      tags: [trade]
      summary: Get current trade direction
      responses:
        "200":
          description: Trade settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSettings"

  /trade/chart:
    get:
      operationId: getTradeChart
      tags: [trade]
      summary: Get trade chart data points
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  /trade/place:
    post:
      operationId: placeTrade
      tags: [trade]
      summary: Place a trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceTradeBody"
      responses:
        "201":
          description: Trade placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trade/cashout:
    post:
      operationId: cashoutTrade
      tags: [trade]
      summary: Cashout active trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashoutTradeBody"
      responses:
        "200":
          description: Cashout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeResult"
        "400":
          description: No active trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trade/history:
    get:
      operationId: getTradeHistory
      tags: [trade]
      summary: Get trade history
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /announcements:
    get:
      operationId: getAnnouncements
      tags: [announcements]
      summary: Get active announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /inbox:
    get:
      operationId: getInbox
      tags: [inbox]
      summary: Get user inbox messages
      responses:
        "200":
          description: Inbox messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxMessage"

  /inbox/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [inbox]
      summary: Mark message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}:
    get:
      operationId: getAdminUser
      tags: [admin]
      summary: Get user detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/suspend:
    patch:
      operationId: suspendUser
      tags: [admin]
      summary: Suspend a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/unsuspend:
    patch:
      operationId: unsuspendUser
      tags: [admin]
      summary: Unsuspend a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unsuspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/plans:
    get:
      operationId: getAdminPlans
      tags: [admin]
      summary: Get all deposit plans (admin)
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepositPlan"
    post:
      operationId: createPlan
      tags: [admin]
      summary: Create a deposit plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanBody"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositPlan"

  /admin/plans/{id}:
    patch:
      operationId: updatePlan
      tags: [admin]
      summary: Update a deposit plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanBody"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositPlan"
    delete:
      operationId: deletePlan
      tags: [admin]
      summary: Delete a deposit plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/tasks:
    get:
      operationId: getAdminTasks
      tags: [admin]
      summary: Get all tasks (admin)
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [admin]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /admin/tasks/{id}:
    patch:
      operationId: updateTask
      tags: [admin]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [admin]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/withdrawals:
    get:
      operationId: getAdminWithdrawals
      tags: [admin]
      summary: Get all withdrawals
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawal"

  /admin/withdrawals/{id}/approve:
    patch:
      operationId: approveWithdrawal
      tags: [admin]
      summary: Approve withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/withdrawals/{id}/reject:
    patch:
      operationId: rejectWithdrawal
      tags: [admin]
      summary: Reject withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectWithdrawalBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/trade/settings:
    get:
      operationId: getAdminTradeSettings
      tags: [admin]
      summary: Get trade settings (admin)
      responses:
        "200":
          description: Trade settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSettings"
    patch:
      operationId: updateTradeDirection
      tags: [admin]
      summary: Update trade direction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTradeDirectionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSettings"

  /admin/announcements:
    get:
      operationId: getAdminAnnouncements
      tags: [admin]
      summary: Get all announcements (admin)
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [admin]
      summary: Create announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [admin]
      summary: Update announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [admin]
      summary: Delete announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/inbox/send:
    post:
      operationId: sendInboxMessage
      tags: [admin]
      summary: Send inbox message to user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInboxMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/reports/export:
    get:
      operationId: exportReports
      tags: [admin]
      summary: Export platform reports summary
      responses:
        "200":
          description: Report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          type: string
        referralCode:
          type: ["string", "null"]
      required: [name, email, phone, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AdminLoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        balance:
          type: number
        totalEarned:
          type: number
        totalDeposited:
          type: number
        vipLevel:
          type: string
        referralCode:
          type: string
        isAdmin:
          type: boolean
        isSuspended:
          type: boolean
        loginBonusClaimedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, email, phone, balance, totalEarned, totalDeposited, vipLevel, referralCode, isAdmin, isSuspended, createdAt]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        mpesaPhone:
          type: ["string", "null"]
        balance:
          type: number
        totalEarned:
          type: number
        totalDeposited:
          type: number
        vipLevel:
          type: string
        referralCode:
          type: string
        language:
          type: string
        createdAt:
          type: string
      required: [id, name, email, phone, balance, totalEarned, totalDeposited, vipLevel, referralCode, language, createdAt]

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        mpesaPhone:
          type: string
        language:
          type: string

    ReferralInfo:
      type: object
